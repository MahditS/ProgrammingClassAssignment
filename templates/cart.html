<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Your Cart</h1>

{% if cart %}

{% for item in cart %}
<div class="cart-item">
{{item.name}} — Qty: {{item.quantity}} — ${{item.total}}
</div>
{% endfor %}

<div class="total">
Subtotal: ${{total}}
</div>
    <div class="total">
Tax: ${{tax}}
</div>  <div class="total">
Final Price: ${{final_cost}}
</div>

<form action="/checkout" method="post">

<label>Your Name</label>
<input name="name" required>

<button type="submit">Checkout</button>

</form>

{% else %}

<p>Your cart is empty.</p>

{% endif %}

<a class="link" href="/">Back to Shop</a>

</div>

</body>
</html>
